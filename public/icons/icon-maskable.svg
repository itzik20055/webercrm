<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0c1e6f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b8862d"/>
      <stop offset="0.5" stop-color="#f4d77c"/>
      <stop offset="1" stop-color="#a67c2a"/>
    </linearGradient>
  </defs>

  <!-- Full bleed white so the maskable crop never shows transparency -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Content scaled to 70% safe zone, centered -->
  <g transform="translate(76.8 76.8) scale(0.7)">
    <text x="256" y="210"
          font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
          font-weight="900" font-size="138" letter-spacing="2"
          text-anchor="middle" fill="url(#navy)">WEBER</text>
    <text x="256" y="340"
          font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
          font-weight="900" font-size="138" letter-spacing="2"
          text-anchor="middle" fill="url(#navy)">TOURS</text>
    <path d="M 90 388 Q 256 432 422 388"
          stroke="url(#gold)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <g transform="translate(330 372) rotate(-12)">
      <path d="M 0 0 L 70 -8 L 90 -2 L 70 4 L 0 0 Z" fill="url(#gold)"/>
      <path d="M 30 -2 L 38 -18 L 46 -16 L 42 -4 Z" fill="url(#gold)"/>
      <path d="M 50 2 L 56 14 L 62 12 L 60 0 Z" fill="url(#gold)"/>
    </g>
    <rect x="64" y="438" width="384" height="5" fill="url(#gold)"/>
  </g>
</svg>
